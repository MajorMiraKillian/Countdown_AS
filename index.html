<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Sumatif AKT</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Arial', sans-serif; overflow: hidden; }

        .container { display: flex; flex-direction: column; height: 100vh; }
        .penabur-blue { background-color: #002366; color: white; }

        /* --- MODIFIKASI BARIS A (3 KOLOM) --- */
        .row-a { 
            height: 20%; 
            display: flex; 
            align-items: center; 
            border-bottom: 5px solid #f1c40f; 
            padding: 0 20px;
        }

        /* A1 & A3 (Tempat Logo) */
        .col-side { 
            flex: 0 0 20%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100%;
        }

        /* A2 (Tempat Teks) */
        .col-center { 
            flex: 0 0 60%; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }

        /* Styling Gambar Logo */
        .logo-img {
            max-height: 80%; /* Menyesuaikan tinggi Baris A */
            max-width: 100%;
            object-fit: contain;
        }

        .row-a h2 { font-size: 2.2rem; margin-bottom: 5px; }
        #current-date { font-size: 1.8rem; font-weight: bold; margin-bottom: 25px; }
        .row-a p strong { font-size: 1.3rem; display: block; }
        .row-a .alamat { font-size: 0.70rem; opacity: 0.8; line-height: 1.4; }

        /* --- BARIS B --- */
        .row-b { 
            height: 60%; background-color: #000000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        
        .timer-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            font-size: 400px;
            color: #39FF14;
            line-height: 1;
        }

        .digit-slot {
            width: 1ch;
            display: flex;
            justify-content: center;
            text-align: center;
        }

        .separator {
            width: 0.5ch;
            display: flex;
            justify-content: center;
        }

        .controls { display: flex; gap: 20px; align-items: center; margin-top: 20px; }
        
        input[type="number"] { 
            padding: 12px; font-size: 22px; width: 110px; 
            background: #111; border: 1px solid #333; color: #39FF14; border-radius: 8px;
            text-align: center;
        }

        .glass-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        .btn-start { background: rgba(57, 255, 20, 0.25); color: #39FF14; border-color: #39FF14; }
        .btn-pause { background: rgba(255, 255, 0, 0.2); color: #ffff00; border-color: #ffff00; }
		/* Tambahkan ini di dalam tag <style> */
		.btn-reset { background: rgba(255, 0, 0, 0.2); color: #ff4d4d; border-color: #ff4d4d; }
		.glass-btn:hover { transform: scale(1.05); }

        /* --- BARIS C --- */
        .row-c { 
            height: 20%; 
            display: flex; justify-content: center; align-items: center; 
            text-align: center; border-top: 5px solid #f1c40f;
        }
        .slogan {
            font-size: 3.6rem;
            font-weight: 900;
            color: #ffffff;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="row-a penabur-blue">
            <div class="col-side">
                <img src="logo-kiri.png" alt="Logo Kiri" class="logo-img">
            </div>
            
            <div class="col-center">
                <h2>Asesmen Sumatif</h2>
                <div id="current-date"></div>
                <p><strong>SMAK PENABUR KOTA TANGERANG</strong></p>
                <div class="alamat">Jalan Honoris Raya Blok J/10 Kota Modern, Tangerang - BANTEN 15117</div>
            </div>

            <div class="col-side">
                <img src="logo-kanan.png" alt="Logo Kanan" class="logo-img">
            </div>
        </div>

        <div class="row-b">
            <div class="timer-wrapper" id="timer-container">
                <div class="digit-slot" id="m1">0</div>
                <div class="digit-slot" id="m2">0</div>
                <div class="separator">:</div>
                <div class="digit-slot" id="s1">0</div>
                <div class="digit-slot" id="s2">0</div>
            </div>

            <div class="controls">
				<input type="number" id="minutes-input" min="1" value="45">
				<button class="glass-btn btn-start" onclick="startTimer()">START</button>
				<button class="glass-btn btn-pause" onclick="pauseTimer()">PAUSE</button>
				<button class="glass-btn btn-reset" onclick="resetTimer()">RESET</button>
			</div>
        </div>

        <div class="row-c penabur-blue">
            <div class="slogan">PRESTASI ITU PENTING, JUJUR YANG PALING UTAMA</div>
        </div>
    </div>

    <script>
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', options);
        }
        updateDate();

        let countdown;
        let totalSeconds = 0;
        let isPaused = false;
        
        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text; msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        function startTimer() {
            if (isPaused && totalSeconds > 0) {
                isPaused = false;
            } else {
                clearInterval(countdown);
                let minutes = parseInt(document.getElementById('minutes-input').value);
                totalSeconds = (isNaN(minutes) ? 0 : minutes) * 60;
                speak("Asesmen Sumatif dimulai, ingatlah, PRESTASI ITU PENTING, JUJUR YANG PALING UTAMA");
            }
            clearInterval(countdown);
            displayTime(totalSeconds);
            countdown = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    speak("Waktu Asesmen Sumatif telah berakhir, kumpulkan Lembar Jawab dan Soal ke pengawas");
                    return;
                }
                totalSeconds--;
                displayTime(totalSeconds);
                if (totalSeconds === 300) speak("Waktu tersisa 5 menit, cek kembali lembar jawab dan data diri anda");
            }, 1000);
        }

        function pauseTimer() { isPaused = true; clearInterval(countdown); }
		
		// Tambahkan fungsi ini di dalam tag <script>
		function resetTimer() {
		clearInterval(countdown);
		totalSeconds = 0;
		isPaused = false;
		displayTime(0);
		speak("waktu hitung mundur asesmen sumatif, diatur ulang");
}

        function displayTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            const minStr = min.toString().padStart(2, '0');
            const secStr = sec.toString().padStart(2, '0');
            document.getElementById('m1').innerText = minStr[0];
            document.getElementById('m2').innerText = minStr[1];
            document.getElementById('s1').innerText = secStr[0];
            document.getElementById('s2').innerText = secStr[1];
        }
    </script>
</body>
</html>
